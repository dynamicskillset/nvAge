<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2e3440"/>
      <stop offset="100%" stop-color="#3b4252"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.03" stroke="#eceff4" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="1200" y1="0" x2="1200" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Accent line at top -->
  <rect x="0" y="0" width="1200" height="4" fill="#88c0d0"/>

  <!-- App icon - enlarged notepad -->
  <g transform="translate(120, 195)" opacity="0.9">
    <rect x="0" y="0" width="120" height="160" rx="12" stroke="#eceff4" stroke-width="4" fill="none"/>
    <g stroke="#eceff4" stroke-width="4" stroke-linecap="round">
      <line x1="24" y1="40" x2="96" y2="40"/>
      <line x1="24" y1="68" x2="80" y2="68"/>
      <line x1="24" y1="96" x2="64" y2="96"/>
      <line x1="24" y1="124" x2="48" y2="124"/>
    </g>
  </g>

  <!-- Title -->
  <text x="290" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="700" fill="#eceff4">nvAge</text>

  <!-- Tagline -->
  <text x="290" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="28" fill="#d8dee9" opacity="0.8">Local-first notes in the tradition of Notational Velocity</text>

  <!-- Feature pills -->
  <g transform="translate(290, 380)" font-family="system-ui, -apple-system, sans-serif" font-size="18">
    <!-- Pill 1 -->
    <rect x="0" y="0" width="160" height="40" rx="20" fill="#434c5e" stroke="#4c566a" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" fill="#88c0d0">Instant search</text>

    <!-- Pill 2 -->
    <rect x="180" y="0" width="170" height="40" rx="20" fill="#434c5e" stroke="#4c566a" stroke-width="1"/>
    <text x="265" y="25" text-anchor="middle" fill="#88c0d0">Keyboard-first</text>

    <!-- Pill 3 -->
    <rect x="370" y="0" width="160" height="40" rx="20" fill="#434c5e" stroke="#4c566a" stroke-width="1"/>
    <text x="450" y="25" text-anchor="middle" fill="#88c0d0">Plain Markdown</text>

    <!-- Pill 4 -->
    <rect x="550" y="0" width="150" height="40" rx="20" fill="#434c5e" stroke="#4c566a" stroke-width="1"/>
    <text x="625" y="25" text-anchor="middle" fill="#88c0d0">Encrypted sync</text>
  </g>

  <!-- Bottom bar -->
  <g transform="translate(120, 560)">
    <text font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#d8dee9" opacity="0.4">github.com/dynamicskillset/nvAge</text>
  </g>

  <!-- Decorative code lines on right side -->
  <g transform="translate(850, 180)" opacity="0.06" font-family="monospace" font-size="14" fill="#eceff4">
    <text x="0" y="0">--- </text>
    <text x="0" y="24">id: a1b2c3d4</text>
    <text x="0" y="48">created: 2025-01-15</text>
    <text x="0" y="72">---</text>
    <text x="0" y="120"># Meeting notes</text>
    <text x="0" y="144">- Discuss project timeline</text>
    <text x="0" y="168">- Review design specs</text>
    <text x="0" y="192">- Assign action items</text>
    <text x="0" y="240">## Next steps</text>
    <text x="0" y="264">1. Finalise requirements</text>
    <text x="0" y="288">2. Begin implementation</text>
    <text x="0" y="312">3. Schedule follow-up</text>
  </g>
</svg>
