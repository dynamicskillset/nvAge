app-id: com.doug.nvage
runtime: org.gnome.Platform
runtime-version: '48'
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node22
command: nvage
finish-args:
  - --share=ipc
  - --socket=fallback-x11
  - --socket=wayland
  - --device=dri
  - --share=network
  - --filesystem=home
  - --filesystem=xdg-config/nvage:create
  - --filesystem=xdg-cache/nvage:create
modules:
  - name: nvage
    buildsystem: simple
    build-options:
      append-path: /usr/lib/sdk/node22/bin
      env:
        NPM_CONFIG_CACHE: /run/build/nvage/npm-cache
        NPM_CONFIG_OFFLINE: 'true'
    build-commands:
      - npm ci --prefer-offline --no-audit --no-fund
      - npm run tauri build
      - install -Dm755 src-tauri/target/release/nvage /app/bin/nvage
      - install -Dm644 com.doug.nvage.desktop /app/share/applications/com.doug.nvage.desktop
      - install -Dm644 src-tauri/icons/32x32.png /app/share/icons/hicolor/32x32/apps/com.doug.nvage.png
      - install -Dm644 src-tauri/icons/128x128.png /app/share/icons/hicolor/128x128/apps/com.doug.nvage.png
      - install -Dm644 src-tauri/icons/128x128@2x.png /app/share/icons/hicolor/256x256/apps/com.doug.nvage.png
      - install -Dm644 src-tauri/icons/icon-512.png /app/share/icons/hicolor/512x512/apps/com.doug.nvage.png
    sources:
      - type: dir
        path: .
        skip:
          - node_modules
          - src-tauri/target
          - dist
          - .git
