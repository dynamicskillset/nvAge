name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            arch: x86_64
            args: ""
          - platform: ubuntu-22.04
            arch: aarch64
            args: "--target aarch64-unknown-linux-gnu"
          - platform: windows-latest
            arch: x86_64
            args: ""
          - platform: windows-latest
            arch: aarch64
            args: "--target aarch64-pc-windows-msvc"
          - platform: macos-latest
            arch: x86_64
            args: "--target x86_64-apple-darwin"
          - platform: macos-latest
            arch: aarch64
            args: "--target aarch64-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'aarch64' && (matrix.platform == 'ubuntu-22.04' && 'aarch64-unknown-linux-gnu' || matrix.platform == 'windows-latest' && 'aarch64-pc-windows-msvc' || 'aarch64-apple-darwin') || '' }}

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev
          ${{ matrix.arch == 'aarch64' && 'sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu' || '' }}

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
