name: Build

on:
  push:
    tags:
      - "v*"
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: "--bundles appimage,deb,rpm"
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev libgtk-3-dev rpm
          # Install linuxdeploy for AppImage bundling
          curl -sSL https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage -o linuxdeploy
          chmod +x linuxdeploy
          sudo mv linuxdeploy /usr/local/bin/linuxdeploy

      - name: Install frontend dependencies
        run: npm install

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: ${{ matrix.args }}
          tagName: ${{ github.ref_name }}
          releaseName: "nvAge ${{ github.ref_name }}"
          releaseBody: |
            See the [CHANGELOG](https://github.com/dynamicskillset/nvAge/blob/main/CHANGELOG.md) for details.

            ### Downloads

            | File | Platform |
            |------|----------|
            | `.dmg` | macOS (Apple Silicon) |
            | `.AppImage` | Linux (any distro, no install) |
            | `.rpm` | Fedora, RHEL, openSUSE |
            | `.flatpak` | Fedora Silverblue, Flatpak-based distros |
            | `.exe` | Windows |
          releaseDraft: false
          prerelease: false

  flatpak:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install flatpak-builder
        run: |
          sudo apt-get update
          sudo apt-get install -y flatpak flatpak-builder

      - name: Add Flathub remote
        run: |
          flatpak remote-add --if-not-exists flathub https://flathub.org/repo/flathub.flatpakrepo

      - name: Install GNOME runtime
        run: |
          flatpak install -y flathub org.gnome.Platform//48 org.gnome.Sdk//48

      - name: Build Flatpak
        run: |
          flatpak-builder --force-clean --repo=repo --install-deps-from=flathub flatpak-build com.doug.nvAge.yml

      - name: Export Flatpak bundle
        run: |
          flatpak build-bundle repo nvage.flatpak com.doug.nvAge

      - name: Upload Flatpak to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: nvage.flatpak
          tag_name: ${{ github.ref_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
